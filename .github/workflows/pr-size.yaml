name: PR Size Label

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: {}

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  size:
    name: Label PR Size
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply Size Label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const changes = pr.additions + pr.deletions;
            let size;
            if (changes < 10) size = 'size/XS';
            else if (changes < 50) size = 'size/S';
            else if (changes < 200) size = 'size/M';
            else if (changes < 500) size = 'size/L';
            else size = 'size/XL';

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];

            // Remove existing size labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const label of labels) {
              if (sizeLabels.includes(label.name) && label.name !== size) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                });
              }
            }

            // Apply new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [size],
            });
