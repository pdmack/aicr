name: Test Deploy Action

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., v0.1.4)'
        required: true
        default: 'v0.1.4'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yaml
    permissions:
      contents: read
      packages: read
      id-token: write
    with:
      image_tag: ${{ inputs.image_tag }}
